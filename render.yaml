# Render Blueprint — deploys Futcaster as one always-on web service. Game data
# lives in Supabase Postgres (free tier), so no persistent disk is needed —
# this can run on Render's free plan. Everyone who visits the URL plays in
# the same arenas.
#
# Deploy: push this repo to GitHub, then Render Dashboard -> New -> Blueprint.
services:
  - type: web
    name: futcaster
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Supabase "Transaction pooler" URI in the dashboard
      - key: ODDS_API_KEY
        sync: false # paste your key in the Render dashboard, keep it out of git
      - key: ODDS_SPORT_KEYS
        value: soccer_fifa_world_cup,soccer_usa_mls,soccer_brazil_campeonato
      - key: ODDS_REFRESH_TTL_MINUTES
        value: "360"
      - key: ODDS_CREDIT_FLOOR
        value: "50"
